<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tests — Download Feature</title>
  <style>
    body { font-family: monospace; padding: 1.5rem; background: #1a1a1a; color: #e0e0e0; }
    h2 { margin-bottom: 1rem; font-size: 1.1rem; color: #aaa; }
    .pass { color: #6abf6a; }
    .fail { color: #bf6a6a; }
    #summary { margin-top: 1rem; font-size: 1rem; border-top: 1px solid #444; padding-top: 0.75rem; }
  </style>
</head>
<body>
  <h2>To-Do List — Download Feature Tests</h2>
  <div id="output"></div>
  <div id="summary"></div>
  <iframe id="app-frame" src="index.html" style="display:none" width="600" height="400"></iframe>

  <script>
    const output = document.getElementById('output');
    let passed = 0, failed = 0;

    function test(desc, fn) {
      try {
        const result = fn();
        if (result === true || result === undefined) {
          passed++;
          output.innerHTML += `<div class="pass">✓ ${desc}</div>`;
        } else {
          failed++;
          output.innerHTML += `<div class="fail">✗ ${desc}: ${result}</div>`;
        }
      } catch (e) {
        failed++;
        output.innerHTML += `<div class="fail">✗ ${desc}: threw ${e.message}</div>`;
      }
    }

    function renderSummary() {
      document.getElementById('summary').innerHTML =
        `Result: <strong>${passed} passed, ${failed} failed</strong>`;
    }

    // ---------------------------------------------------------------------------
    // Replicated export logic from index.html (must stay in sync with app)
    // ---------------------------------------------------------------------------
    let tasks = [];
    let sortMode = 'default';
    let filterMode = 'all';

    function getViewTasks() {
      let view = tasks.map((task, i) => ({ ...task, _idx: i }));
      if (filterMode === 'active') view = view.filter(t => !t.done);
      else if (filterMode === 'completed') view = view.filter(t => t.done);
      if (sortMode === 'az') view.sort((a, b) => a.text.localeCompare(b.text));
      else if (sortMode === 'za') view.sort((a, b) => b.text.localeCompare(a.text));
      return view;
    }

    function buildDownloadData() {
      return getViewTasks().map(({ text, done }) => ({ text, done }));
    }

    // ---------------------------------------------------------------------------
    // Logic tests (filter / sort / shape)
    // ---------------------------------------------------------------------------
    test('empty list exports as empty array', () => {
      tasks = []; filterMode = 'all'; sortMode = 'default';
      const data = buildDownloadData();
      return JSON.stringify(data) === '[]' || `got ${JSON.stringify(data)}`;
    });

    test('exported items have exactly text and done fields', () => {
      tasks = [{ text: 'Buy milk', done: false }];
      filterMode = 'all'; sortMode = 'default';
      const [item] = buildDownloadData();
      const keys = Object.keys(item).sort().join(',');
      return keys === 'done,text' || `got keys: ${keys}`;
    });

    test('exported items do not include internal _idx field', () => {
      tasks = [{ text: 'Task A', done: false }];
      filterMode = 'all'; sortMode = 'default';
      const [item] = buildDownloadData();
      return !('_idx' in item) || 'found _idx in exported item';
    });

    test('filter=all exports all tasks', () => {
      tasks = [{ text: 'Active', done: false }, { text: 'Done', done: true }];
      filterMode = 'all'; sortMode = 'default';
      const data = buildDownloadData();
      return data.length === 2 || `expected 2, got ${data.length}`;
    });

    test('filter=active exports only incomplete tasks', () => {
      tasks = [{ text: 'Active', done: false }, { text: 'Done', done: true }];
      filterMode = 'active'; sortMode = 'default';
      const data = buildDownloadData();
      return data.length === 1 && !data[0].done || `got ${JSON.stringify(data)}`;
    });

    test('filter=completed exports only done tasks', () => {
      tasks = [{ text: 'Active', done: false }, { text: 'Done', done: true }];
      filterMode = 'completed'; sortMode = 'default';
      const data = buildDownloadData();
      return data.length === 1 && data[0].done || `got ${JSON.stringify(data)}`;
    });

    test('sort=az exports tasks in alphabetical order', () => {
      tasks = [{ text: 'Zebra', done: false }, { text: 'Apple', done: false }];
      filterMode = 'all'; sortMode = 'az';
      const data = buildDownloadData();
      return data[0].text === 'Apple' && data[1].text === 'Zebra'
        || `got order: ${data.map(t => t.text).join(', ')}`;
    });

    test('sort=za exports tasks in reverse alphabetical order', () => {
      tasks = [{ text: 'Apple', done: false }, { text: 'Zebra', done: false }];
      filterMode = 'all'; sortMode = 'za';
      const data = buildDownloadData();
      return data[0].text === 'Zebra' && data[1].text === 'Apple'
        || `got order: ${data.map(t => t.text).join(', ')}`;
    });

    test('sort=default preserves insertion order', () => {
      tasks = [{ text: 'First', done: false }, { text: 'Second', done: false }];
      filterMode = 'all'; sortMode = 'default';
      const data = buildDownloadData();
      return data[0].text === 'First' && data[1].text === 'Second'
        || `got order: ${data.map(t => t.text).join(', ')}`;
    });

    test('download URI uses application/json MIME type', () => {
      tasks = [{ text: 'Task', done: false }];
      filterMode = 'all'; sortMode = 'default';
      const data = buildDownloadData();
      const uri = 'data:application/json;charset=utf-8,'
        + encodeURIComponent(JSON.stringify(data, null, 2));
      return uri.startsWith('data:application/json;charset=utf-8,')
        || 'unexpected MIME type prefix';
    });

    test('download URI content decodes to valid JSON array', () => {
      tasks = [{ text: 'Decode me', done: true }];
      filterMode = 'all'; sortMode = 'default';
      const data = buildDownloadData();
      const encoded = encodeURIComponent(JSON.stringify(data, null, 2));
      const decoded = JSON.parse(decodeURIComponent(encoded));
      return Array.isArray(decoded)
        && decoded[0].text === 'Decode me'
        && decoded[0].done === true
        || `decoded: ${JSON.stringify(decoded)}`;
    });

    // ---------------------------------------------------------------------------
    // DOM tests via iframe
    // ---------------------------------------------------------------------------
    document.getElementById('app-frame').addEventListener('load', () => {
      try {
        const frame = document.getElementById('app-frame');
        const doc = frame.contentDocument;

        test('download button exists in the app DOM', () => {
          return !!doc.getElementById('download-btn')
            || 'no element with id="download-btn" found';
        });

        test('download button label is "Download JSON"', () => {
          const btn = doc.getElementById('download-btn');
          const label = btn && btn.textContent.trim();
          return label === 'Download JSON' || `got "${label}"`;
        });

        test('clicking download button creates an anchor with JSON data URI', () => {
          const origCreate = doc.createElement.bind(doc);
          let captured = null;
          doc.createElement = function (tag) {
            const el = origCreate(tag);
            if (tag.toLowerCase() === 'a') {
              captured = el;
              el.click = () => {}; // suppress actual file download
            }
            return el;
          };
          doc.getElementById('download-btn').click();
          doc.createElement = origCreate;
          return captured !== null && captured.href.includes('application%2Fjson')
            || `anchor href: ${captured ? captured.href.slice(0, 60) : 'null'}`;
        });

        test('download anchor has filename tasks.json', () => {
          const origCreate = doc.createElement.bind(doc);
          let captured = null;
          doc.createElement = function (tag) {
            const el = origCreate(tag);
            if (tag.toLowerCase() === 'a') {
              captured = el;
              el.click = () => {};
            }
            return el;
          };
          doc.getElementById('download-btn').click();
          doc.createElement = origCreate;
          return captured && captured.download === 'tasks.json'
            || `download attr: "${captured ? captured.download : 'null'}"`;
        });

      } catch (e) {
        failed++;
        output.innerHTML += `<div class="fail">✗ iframe DOM tests failed: ${e.message}</div>`;
      }

      renderSummary();
    });

    // Render summary for logic-only tests if iframe somehow never fires load
    // (summary will be overwritten when iframe load fires)
    renderSummary();
  </script>
</body>
</html>
