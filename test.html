<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tests — Import Button</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 640px; margin: auto; }
    h1 { font-size: 1.3rem; margin-bottom: 1rem; }
    .pass { color: #2a7; }
    .fail { color: #c00; font-weight: bold; }
    .suite { margin-bottom: 1.5rem; }
    h2 { font-size: 1rem; margin-bottom: 0.5rem; border-bottom: 1px solid #ccc; padding-bottom: 0.25rem; }
    li { list-style: none; padding: 0.2rem 0; font-size: 0.9rem; }
    #summary { font-weight: bold; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>Import Button Tests</h1>
  <div id="output"></div>
  <div id="summary"></div>

  <!-- Hidden iframe loads app for DOM-based tests -->
  <iframe id="app-frame" src="index.html" style="display:none"></iframe>

  <script>
    const results = [];

    function assert(label, condition) {
      results.push({ label, pass: !!condition });
    }

    function simulateImport(tasks, frameDoc, frameWin) {
      const importFile = frameDoc.getElementById('import-file');
      const json = JSON.stringify(tasks);

      // Build a synthetic event by directly invoking the FileReader path
      const reader = new FileReader();
      const originalOnLoad = null;

      // Manually trigger the change handler logic by constructing a fake event
      // We do this by replacing the file input's listener via a direct call into
      // the app's importFile change handler (shimmed below via postMessage-like
      // approach: just call the handler directly on the frame's FileReader mock).

      // Inject a helper on the frame to simulate a file load
      frameWin.__simulateFileLoad = function(jsonString) {
        const importFile = frameDoc.getElementById('import-file');
        // Dispatch a synthetic event after setting up a mock files list
        const blob = new Blob([jsonString], { type: 'application/json' });
        blob.name = 'test.json';
        const dt = new DataTransfer();
        // DataTransfer + FileList isn't easily mockable; use the reader.onload path directly
        // Instead, fire a custom event that the test listener below handles
        importFile.dispatchEvent(new CustomEvent('__test_load', { detail: jsonString }));
      };

      // Patch the importFile change listener in the frame to also handle __test_load
      importFile.addEventListener('__test_load', (e) => {
        const data = JSON.parse(e.detail);
        // Replicate the import logic exactly as in index.html
        if (!Array.isArray(data)) throw new Error('not an array');
        frameWin.__importedTasks = data
          .filter(t => t && typeof t.text === 'string')
          .map(t => ({ text: t.text, done: !!t.done }));
        // Write to localStorage and tasks array
        frameWin.localStorage.setItem('tasks', JSON.stringify(frameWin.__importedTasks));
      });
    }

    // ---- Pure logic tests (no iframe needed) ----
    // These replicate the import handler logic directly

    function runImportLogic(jsonString) {
      const data = JSON.parse(jsonString);
      if (!Array.isArray(data)) throw new Error('not an array');
      return data
        .filter(t => t && typeof t.text === 'string')
        .map(t => ({ text: t.text, done: !!t.done }));
    }

    const output = document.getElementById('output');
    const summary = document.getElementById('summary');

    function renderResults() {
      const pass = results.filter(r => r.pass).length;
      const fail = results.filter(r => !r.pass).length;
      output.innerHTML = results.map(r =>
        `<li class="${r.pass ? 'pass' : 'fail'}">${r.pass ? '✓' : '✗'} ${r.label}</li>`
      ).join('');
      summary.textContent = `${pass} passed, ${fail} failed`;
      summary.className = fail === 0 ? 'pass' : 'fail';
    }

    // --- Suite: import logic ---

    // 1. Valid array with text+done fields
    {
      const result = runImportLogic('[{"text":"Buy milk","done":false},{"text":"Walk dog","done":true}]');
      assert('imports valid array of tasks', result.length === 2);
      assert('preserves text field', result[0].text === 'Buy milk');
      assert('preserves done=false', result[0].done === false);
      assert('preserves done=true', result[1].done === true);
    }

    // 2. Filters items missing text property
    {
      const result = runImportLogic('[{"text":"Keep me"},{"done":false},null,{"text":"Also keep"}]');
      assert('filters items missing text property', result.length === 2);
      assert('kept correct items', result[0].text === 'Keep me' && result[1].text === 'Also keep');
    }

    // 3. done coerced to boolean
    {
      const result = runImportLogic('[{"text":"A","done":1},{"text":"B","done":0},{"text":"C"}]');
      assert('coerces truthy done to true', result[0].done === true);
      assert('coerces falsy done to false', result[1].done === false);
      assert('missing done defaults to false', result[2].done === false);
    }

    // 4. Extra properties are stripped
    {
      const result = runImportLogic('[{"text":"Task","done":false,"id":99,"extra":"stuff"}]');
      assert('strips extra properties', !('id' in result[0]) && !('extra' in result[0]));
    }

    // 5. Empty array is valid
    {
      const result = runImportLogic('[]');
      assert('empty array produces empty task list', result.length === 0);
    }

    // 6. Non-array throws
    {
      let threw = false;
      try { runImportLogic('{"text":"not an array"}'); } catch { threw = true; }
      assert('non-array JSON throws error', threw);
    }

    // 7. Invalid JSON throws (simulating the catch block)
    {
      let threw = false;
      try { JSON.parse('not valid json at all'); } catch { threw = true; }
      assert('invalid JSON throws (caught by try/catch in handler)', threw);
    }

    // --- Suite: DOM structure ---

    const appFrame = document.getElementById('app-frame');
    appFrame.addEventListener('load', () => {
      const doc = appFrame.contentDocument;

      assert('import button exists in DOM', !!doc.getElementById('import-btn'));
      assert('import button text is "Import JSON"', doc.getElementById('import-btn').textContent === 'Import JSON');
      assert('hidden file input exists', !!doc.getElementById('import-file'));
      assert('file input is hidden', doc.getElementById('import-file').style.display === 'none');
      assert('file input accepts .json', doc.getElementById('import-file').getAttribute('accept') === '.json');
      assert('import button is visible (no display:none)', doc.getElementById('import-btn').style.display !== 'none');

      renderResults();
    });

    // Render logic-only results immediately (frame tests append on load)
    renderResults();
  </script>
</body>
</html>
