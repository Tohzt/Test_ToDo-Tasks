<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f5f5f5;
      --text: #222;
      --input-border: #ccc;
      --input-focus: #555;
      --btn-bg: #333;
      --btn-hover: #555;
      --item-bg: #e8f5e9;
      --item-border: #a5d6a7;
      --item-done-bg: #f3e0e0;
      --item-done-border: #c9a0a0;
      --task-color: #2a7a2a;
      --task-done-color: #7b3030;
      --footer-color: #888;
      --drag-handle: #bbb;
    }

    body.dark {
      --bg: #1a1a1a;
      --text: #e0e0e0;
      --input-border: #444;
      --input-focus: #aaa;
      --btn-bg: #555;
      --btn-hover: #777;
      --item-bg: #1e2e1e;
      --item-border: #3a5a3a;
      --item-done-bg: #2e1e1e;
      --item-done-border: #5a3a3a;
      --task-color: #6abf6a;
      --task-done-color: #bf6a6a;
      --footer-color: #777;
      --drag-handle: #555;
    }

    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
      transition: background 0.2s, color 0.2s;
    }

    #app {
      width: 100%;
      max-width: 480px;
    }

    #header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
    }

    #theme-btn {
      background: none;
      border: 1px solid var(--input-border);
      color: var(--text);
      font-size: 1rem;
      border-radius: 4px;
      padding: 0.3rem 0.6rem;
      cursor: pointer;
      line-height: 1;
    }

    #theme-btn:hover {
      border-color: var(--input-focus);
    }

    #input-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    #task-input {
      flex: 1;
      padding: 0.5rem 0.75rem;
      font-size: 1rem;
      border: 1px solid var(--input-border);
      border-radius: 4px;
      outline: none;
      background: var(--bg);
      color: var(--text);
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    #task-input:focus {
      border-color: var(--input-focus);
    }

    #add-btn {
      padding: 0.5rem 1rem;
      font-size: 1rem;
      background: var(--btn-bg);
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #add-btn:hover {
      background: var(--btn-hover);
    }

    #task-list {
      list-style: none;
    }

    #task-list li {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 0.75rem;
      background: var(--item-bg);
      border: 1px solid var(--item-border);
      border-radius: 4px;
      margin-bottom: 0.5rem;
      transition: background 0.15s, border-color 0.15s;
    }

    #task-list li.done-item {
      background: var(--item-done-bg);
      border-color: var(--item-done-border);
    }

    #task-list li[draggable="true"] {
      cursor: grab;
    }

    #task-list li.dragging {
      opacity: 0.4;
      cursor: grabbing;
    }

    #task-list li.drag-over {
      border-color: #555;
      border-style: dashed;
    }

    .drag-handle {
      color: var(--drag-handle);
      font-size: 1rem;
      cursor: grab;
      user-select: none;
      padding: 0 0.1rem;
      flex-shrink: 0;
    }

    .task-text {
      flex: 1;
      cursor: pointer;
      font-size: 1rem;
      user-select: none;
      color: var(--task-color);
      font-weight: 500;
    }

    .task-text.done {
      text-decoration: line-through;
      color: var(--task-done-color);
      font-weight: 400;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #bbb;
      font-size: 1.1rem;
      cursor: pointer;
      line-height: 1;
      padding: 0 0.2rem;
    }

    .delete-btn:hover {
      color: #c00;
    }

    #footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: var(--footer-color);
      min-height: 1.5rem;
    }

    #clear-btn {
      background: none;
      border: none;
      color: var(--footer-color);
      font-size: 0.85rem;
      cursor: pointer;
      padding: 0;
    }

    #clear-btn:hover {
      color: #c00;
      text-decoration: underline;
    }

    #controls-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .ctrl-label {
      font-size: 0.8rem;
      color: var(--footer-color);
      margin-right: 0.1rem;
    }

    .ctrl-btn {
      background: none;
      border: 1px solid var(--input-border);
      color: var(--text);
      font-size: 0.8rem;
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .ctrl-btn:hover {
      border-color: var(--input-focus);
    }

    .ctrl-btn.active {
      background: var(--btn-bg);
      color: #fff;
      border-color: var(--btn-bg);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="header">
      <h1>To-Do List</h1>
      <button id="theme-btn" aria-label="Toggle dark mode">🌙</button>
    </div>
    <div id="input-row">
      <input id="task-input" type="text" placeholder="Add a task…" autocomplete="off">
      <button id="add-btn">Add</button>
    </div>
    <div id="controls-row">
      <div class="ctrl-group">
        <span class="ctrl-label">Sort:</span>
        <button class="ctrl-btn active" data-sort="default">Default</button>
        <button class="ctrl-btn" data-sort="az">A→Z</button>
        <button class="ctrl-btn" data-sort="za">Z→A</button>
      </div>
      <div class="ctrl-group">
        <span class="ctrl-label">Show:</span>
        <button class="ctrl-btn active" data-filter="all">All</button>
        <button class="ctrl-btn" data-filter="active">Active</button>
        <button class="ctrl-btn" data-filter="completed">Done</button>
      </div>
    </div>
    <ul id="task-list"></ul>
    <div id="footer">
      <span id="task-count"></span>
      <button id="clear-btn" style="display:none">Clear completed</button>
    </div>
  </div>

  <script>
    const input = document.getElementById('task-input');
    const addBtn = document.getElementById('add-btn');
    const list = document.getElementById('task-list');
    const taskCount = document.getElementById('task-count');
    const clearBtn = document.getElementById('clear-btn');
    const themeBtn = document.getElementById('theme-btn');

    const isDark = () => document.body.classList.contains('dark');

    function applyTheme(dark) {
      document.body.classList.toggle('dark', dark);
      themeBtn.textContent = dark ? '☀️' : '🌙';
      themeBtn.setAttribute('aria-label', dark ? 'Switch to light mode' : 'Switch to dark mode');
    }

    applyTheme(localStorage.getItem('theme') === 'dark');

    themeBtn.addEventListener('click', () => {
      const dark = !isDark();
      localStorage.setItem('theme', dark ? 'dark' : 'light');
      applyTheme(dark);
    });

    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
    let sortMode = 'default';
    let filterMode = 'all';

    function save() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function getViewTasks() {
      let view = tasks.map((task, i) => ({ ...task, _idx: i }));
      if (filterMode === 'active') view = view.filter(t => !t.done);
      else if (filterMode === 'completed') view = view.filter(t => t.done);
      if (sortMode === 'az') view.sort((a, b) => a.text.localeCompare(b.text));
      else if (sortMode === 'za') view.sort((a, b) => b.text.localeCompare(a.text));
      return view;
    }

    let dragSrcIdx = null;

    function render() {
      const view = getViewTasks();
      list.innerHTML = '';
      const remaining = tasks.filter(t => !t.done).length;
      const completed = tasks.filter(t => t.done).length;
      taskCount.textContent = tasks.length === 0 ? '' : `${remaining} item${remaining !== 1 ? 's' : ''} left`;
      clearBtn.style.display = completed > 0 ? '' : 'none';

      const canDrag = sortMode === 'default';

      view.forEach((task) => {
        const li = document.createElement('li');
        li.draggable = canDrag;
        if (task.done) li.classList.add('done-item');

        const handle = document.createElement('span');
        handle.className = 'drag-handle';
        handle.textContent = '⠿';
        handle.setAttribute('aria-hidden', 'true');
        if (!canDrag) {
          handle.style.opacity = '0.3';
          handle.style.cursor = 'default';
        }

        const span = document.createElement('span');
        span.className = 'task-text' + (task.done ? ' done' : '');
        span.textContent = task.text;
        span.addEventListener('click', () => {
          tasks[task._idx].done = !tasks[task._idx].done;
          save();
          render();
        });

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = '✕';
        del.setAttribute('aria-label', 'Delete task');
        del.addEventListener('click', () => {
          tasks.splice(task._idx, 1);
          save();
          render();
        });

        if (canDrag) {
          li.addEventListener('dragstart', () => {
            dragSrcIdx = task._idx;
            li.classList.add('dragging');
          });
          li.addEventListener('dragend', () => {
            li.classList.remove('dragging');
            list.querySelectorAll('li').forEach(el => el.classList.remove('drag-over'));
          });
          li.addEventListener('dragover', (e) => {
            e.preventDefault();
            list.querySelectorAll('li').forEach(el => el.classList.remove('drag-over'));
            li.classList.add('drag-over');
          });
          li.addEventListener('drop', (e) => {
            e.preventDefault();
            if (dragSrcIdx === null || dragSrcIdx === task._idx) return;
            const moved = tasks.splice(dragSrcIdx, 1)[0];
            const targetIdx = task._idx > dragSrcIdx ? task._idx - 1 : task._idx;
            tasks.splice(targetIdx, 0, moved);
            dragSrcIdx = null;
            save();
            render();
          });
        }

        li.appendChild(handle);
        li.appendChild(span);
        li.appendChild(del);
        list.appendChild(li);
      });
    }

    function addTask() {
      const text = input.value.trim();
      if (!text) return;
      tasks.push({ text, done: false });
      save();
      render();
      input.value = '';
      input.focus();
    }

    addBtn.addEventListener('click', addTask);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTask();
    });
    clearBtn.addEventListener('click', () => {
      tasks = tasks.filter(t => !t.done);
      save();
      render();
    });

    document.querySelectorAll('[data-sort]').forEach(btn => {
      btn.addEventListener('click', () => {
        sortMode = btn.dataset.sort;
        document.querySelectorAll('[data-sort]').forEach(b => b.classList.toggle('active', b === btn));
        render();
      });
    });

    document.querySelectorAll('[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        filterMode = btn.dataset.filter;
        document.querySelectorAll('[data-filter]').forEach(b => b.classList.toggle('active', b === btn));
        render();
      });
    });

    render();
  </script>
</body>
</html>
