<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }

    #app {
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
    }

    #input-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    #task-input {
      flex: 1;
      padding: 0.5rem 0.75rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      outline: none;
    }

    #task-input:focus {
      border-color: #555;
    }

    #add-btn {
      padding: 0.5rem 1rem;
      font-size: 1rem;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    #add-btn:hover {
      background: #555;
    }

    #task-list {
      list-style: none;
    }

    #task-list li {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 0.75rem;
      background: #e8f5e9;
      border: 1px solid #a5d6a7;
      border-radius: 4px;
      margin-bottom: 0.5rem;
      transition: background 0.15s, border-color 0.15s;
    }

    #task-list li.done-item {
      background: #f3e0e0;
      border-color: #c9a0a0;
    }

    #task-list li[draggable="true"] {
      cursor: grab;
    }

    #task-list li.dragging {
      opacity: 0.4;
      cursor: grabbing;
    }

    #task-list li.drag-over {
      border-color: #555;
      border-style: dashed;
    }

    .drag-handle {
      color: #bbb;
      font-size: 1rem;
      cursor: grab;
      user-select: none;
      padding: 0 0.1rem;
      flex-shrink: 0;
    }

    .task-text {
      flex: 1;
      cursor: pointer;
      font-size: 1rem;
      user-select: none;
      color: #2a7a2a;
      font-weight: 500;
    }

    .task-text.done {
      text-decoration: line-through;
      color: #7b3030;
      font-weight: 400;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #bbb;
      font-size: 1.1rem;
      cursor: pointer;
      line-height: 1;
      padding: 0 0.2rem;
    }

    .delete-btn:hover {
      color: #c00;
    }

    #footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: #888;
      min-height: 1.5rem;
    }

    #clear-btn {
      background: none;
      border: none;
      color: #888;
      font-size: 0.85rem;
      cursor: pointer;
      padding: 0;
    }

    #clear-btn:hover {
      color: #c00;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div id="app">
    <h1>To-Do List</h1>
    <div id="input-row">
      <input id="task-input" type="text" placeholder="Add a task…" autocomplete="off">
      <button id="add-btn">Add</button>
    </div>
    <ul id="task-list"></ul>
    <div id="footer">
      <span id="task-count"></span>
      <button id="clear-btn" style="display:none">Clear completed</button>
    </div>
  </div>

  <script>
    const input = document.getElementById('task-input');
    const addBtn = document.getElementById('add-btn');
    const list = document.getElementById('task-list');
    const taskCount = document.getElementById('task-count');
    const clearBtn = document.getElementById('clear-btn');

    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');

    function save() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    let dragSrcIndex = null;

    function render() {
      list.innerHTML = '';
      const remaining = tasks.filter(t => !t.done).length;
      const completed = tasks.filter(t => t.done).length;
      taskCount.textContent = tasks.length === 0 ? '' : `${remaining} item${remaining !== 1 ? 's' : ''} left`;
      clearBtn.style.display = completed > 0 ? '' : 'none';
      tasks.forEach((task, i) => {
        const li = document.createElement('li');
        li.draggable = true;
        if (task.done) li.classList.add('done-item');

        const handle = document.createElement('span');
        handle.className = 'drag-handle';
        handle.textContent = '⠿';
        handle.setAttribute('aria-hidden', 'true');

        const span = document.createElement('span');
        span.className = 'task-text' + (task.done ? ' done' : '');
        span.textContent = task.text;
        span.addEventListener('click', () => {
          tasks[i].done = !tasks[i].done;
          save();
          render();
        });

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = '✕';
        del.setAttribute('aria-label', 'Delete task');
        del.addEventListener('click', () => {
          tasks.splice(i, 1);
          save();
          render();
        });

        li.addEventListener('dragstart', () => {
          dragSrcIndex = i;
          li.classList.add('dragging');
        });
        li.addEventListener('dragend', () => {
          li.classList.remove('dragging');
          list.querySelectorAll('li').forEach(el => el.classList.remove('drag-over'));
        });
        li.addEventListener('dragover', (e) => {
          e.preventDefault();
          list.querySelectorAll('li').forEach(el => el.classList.remove('drag-over'));
          li.classList.add('drag-over');
        });
        li.addEventListener('drop', (e) => {
          e.preventDefault();
          if (dragSrcIndex === null || dragSrcIndex === i) return;
          const moved = tasks.splice(dragSrcIndex, 1)[0];
          tasks.splice(i, 0, moved);
          dragSrcIndex = null;
          save();
          render();
        });

        li.appendChild(handle);
        li.appendChild(span);
        li.appendChild(del);
        list.appendChild(li);
      });
    }

    function addTask() {
      const text = input.value.trim();
      if (!text) return;
      tasks.push({ text, done: false });
      save();
      render();
      input.value = '';
      input.focus();
    }

    addBtn.addEventListener('click', addTask);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTask();
    });
    clearBtn.addEventListener('click', () => {
      tasks = tasks.filter(t => !t.done);
      save();
      render();
    });

    render();
  </script>
</body>
</html>
